<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View on QuickServ</title>
    <!-- Social Media Previews (WhatsApp, iMessage, Facebook) -->
    <meta property="og:title" content="Check out this Expert on QuickServ!" />
    <meta property="og:description" content="Tap here to instantly open the app, view their premium portfolio, and book an appointment securely." />
    <meta property="og:image" content="https://Simu00000022.github.io/quickserv-link/assets/images/icon.png" />
    <meta property="og:type" content="website" />
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background-color: #f8fafc; margin: 0; text-align: center; padding: 20px; 
        }
        .card { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0px 10px 25px rgba(0,0,0,0.05); max-width: 400px; width: 100%; border: 1px solid #e2e8f0;
        }
        h1 { color: #0f172a; font-size: 24px; margin-bottom: 8px; font-weight: 800; letter-spacing: -0.5px; }
        p { color: #64748b; margin-bottom: 32px; line-height: 1.5; font-size: 15px;}
        .btn { 
            display: inline-block; background-color: #818cf8; color: white; padding: 16px 28px; 
            border-radius: 14px; text-decoration: none; font-weight: 700; font-size: 16px; 
            width: 100%; box-sizing: border-box; transition: all 0.2s ease;
            box-shadow: 0px 4px 12px rgba(129, 140, 248, 0.3);
        }
        .btn:active { transform: scale(0.97); }
        .small-text { font-size: 11px; color: #94a3b8; margin-top: 24px; display: block; font-weight: 500;}
    </style>
</head>
<body>
    <div class="card">
        <h1>Opening QuickServ...</h1>
        <p>You are being securely redirected to the app. If you don't have it installed, you will need to download it first.</p>
        <a id="fallbackBtn" href="#" class="btn">Launch QuickServ App</a>
        <span class="small-text">App login is required to access sensitive booking and portfolio data. <br><br><b>Platform Secured by QuickServ Systems.</b></span>
    </div>

    <script>
        // Extract the provider ID from the ?provider= parameter in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const providerId = urlParams.get('provider');
        
        if (providerId) {
            // Build the exact deep link scheme configured in app.json (e.g. quickserv://provider/123)
            const deepLink = `quickserv://provider/${providerId}`;
            
            // Allow the user to manually click the button if automatic popup blocking stops the redirect
            document.getElementById('fallbackBtn').href = deepLink;

            // Automatically trigger the deeply nested iOS/Android Universal router link
            setTimeout(() => {
                window.location.href = deepLink;
            }, 800);
        } else {
            // Error Handling: Someone visited the link directly without an ID target.
            document.querySelector("h1").innerText = "Oops! Link Broken";
            document.querySelector("p").innerText = "We couldn't find the provider ID in this link. Please ask for a new sharing link.";
            document.getElementById('fallbackBtn').style.display = 'none';
        }
    </script>
</body>
</html>
